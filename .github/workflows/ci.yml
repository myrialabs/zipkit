name: CI & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          for f in dist/index.js dist/index.d.ts dist/cli.js engine/dist/zipkit-engine.mjs engine/dist/zipkit-engine.wasm; do
            if [ ! -f "$f" ]; then echo "Build failed — missing $f"; exit 1; fi
          done
          echo "dist + engine artifacts present."

  node-matrix:
    name: Smoke test on Node ${{ matrix.node }}
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install & build
        run: bun install && bun run build

      - name: Import & roundtrip under Node
        run: |
          node --input-type=module -e "
            import { gzip, gunzip, compress, decompress } from './dist/index.js';
            import { zip, unzip } from './dist/zip/index.js';
            const d = new TextEncoder().encode('node smoke '.repeat(100));
            const ok1 = Buffer.from(await gunzip(await gzip(d))).equals(Buffer.from(d));
            const ok2 = Buffer.from(await decompress(await compress(d, 'zstd'))).equals(Buffer.from(d));
            const back = await unzip(await zip([{ name: 'a', data: d }]));
            const ok3 = Buffer.from(back[0].data).equals(Buffer.from(d));
            if (!(ok1 && ok2 && ok3)) { console.error('roundtrip failed', { ok1, ok2, ok3 }); process.exit(1); }
            console.log('Node ${{ matrix.node }} roundtrip OK');
          "

  pack:
    name: npm pack smoke test
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build & pack
        run: |
          bun install
          bun run build
          npm pack
          tar -tf zipkit-*.tgz | grep -E 'engine/dist/zipkit-engine.wasm|dist/index.js' || (echo "tarball missing required files" && exit 1)
          echo "Tarball contents verified."

  build-engine:
    name: Rebuild Wasm engine (anti-drift)
    needs: ci
    runs-on: ubuntu-latest
    # Informational: flags if the committed engine drifts from a fresh build.
    # Does not block CI, since exact byte-reproducibility depends on the emcc build.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Rebuild engine and compare hashes
        run: |
          before=$(shasum -a 256 engine/dist/zipkit-engine.wasm | awk '{print $1}')
          bash engine/build.sh
          after=$(shasum -a 256 engine/dist/zipkit-engine.wasm | awk '{print $1}')
          echo "committed: $before"
          echo "rebuilt  : $after"
          if [ "$before" != "$after" ]; then
            echo "::warning::Committed engine differs from a fresh build (toolchain version drift is expected)."
          else
            echo "Engine reproduced byte-for-byte."
          fi

  publish:
    name: Publish & Release
    needs: [ci, node-matrix, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
